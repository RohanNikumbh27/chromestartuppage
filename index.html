<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Start Page</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="background-image"></div>
    <div class="overlay"></div>

    <main class="container">
        
        <!-- Shortcuts Panel (Half Screen) -->
        <section class="panel shortcuts-panel" id="shortcuts-panel">
            <header class="panel-header">
                <h2><i class="fa-solid fa-compass"></i> Shortcuts</h2>
                <button id="add-shortcut-btn" class="icon-btn" aria-label="Add Shortcut">
                    <i class="fa-solid fa-plus"></i>
                </button>
            </header>
            <div class="shortcuts-grid" id="shortcuts-grid">
                <!-- Shortcuts injected here via JS -->
            </div>
            
        </section>

        <!-- Main Panel (Half Screen) -->
        <section class="panel todo-panel glass-panel" id="todo-panel">
            <header class="panel-header" style="flex-wrap: wrap;">
                <div style="display: flex; align-items: center; gap: 1rem; flex: 1; min-width: 0;">
                    <div class="view-toggle">
                        <button id="view-tasks-btn" class="view-btn active">Tasks</button>
                        <button id="view-notes-btn" class="view-btn">Notes</button>
                    </div>
                    <div class="list-selector-container" id="tasks-header-controls">
                        <div id="lists-scroller" class="lists-scroller"></div>
                        <button id="add-list-btn" class="icon-btn-small" style="flex-shrink: 0;" aria-label="Add List" title="Add new list"><i class="fa-solid fa-plus"></i></button>
                        <button id="delete-list-btn" class="icon-btn-small text-danger" style="flex-shrink: 0; color: var(--danger);" aria-label="Delete List" title="Delete this list"><i class="fa-solid fa-trash"></i></button>
                    </div>
                </div>
                <span class="date-display" id="date-display"></span>
            </header>
            
            <div id="tasks-view" class="view-container">
                <form id="todo-form" class="todo-input-group">
                    <input type="text" id="todo-input" class="glass-input" placeholder="What needs to be done..." autocomplete="off">
                    <button type="submit" class="icon-btn primary-icon-btn" style="border-radius: 12px;"><i class="fa-solid fa-arrow-up"></i></button>
                </form>

                <ul class="todo-list" id="todo-list">
                    <!-- Todos injected here via JS -->
                </ul>
                
                <div class="todo-stats">
                    <span id="todo-count">0 items left</span>
                    <button id="clear-completed" class="text-btn">Clear Completed</button>
                </div>
            </div>

            <div id="notes-view" class="view-container hidden-view">
                <textarea id="notes-textarea" class="notes-textarea" placeholder="Start typing..."></textarea>
            </div>
        </section>

        <!-- Add List Modal -->
        <div id="list-modal" class="modal hidden">
            <div class="modal-content glass-panel">
                <h3>Create New List</h3>
                <input type="text" id="list-name" class="glass-input" placeholder="List Name (e.g. Fitness)">
                <div class="modal-actions">
                    <button id="cancel-list" class="btn btn-secondary">Cancel</button>
                    <button id="save-list" class="btn btn-primary">Save</button>
                </div>
            </div>
        </div>

    </main>

    <!-- Modals -->
    <!-- Add Shortcut Modal -->
    <div id="shortcut-modal" class="modal hidden">
        <div class="modal-content glass-panel">
            <h3>Add New Shortcut</h3>
            <input type="text" id="shortcut-name" class="glass-input" placeholder="Name (e.g. YouTube)">
            <input type="url" id="shortcut-url" class="glass-input" placeholder="URL (e.g. https://youtube.com)">
            <div class="modal-actions">
                <button id="cancel-shortcut" class="btn btn-secondary">Cancel</button>
                <button id="save-shortcut" class="btn btn-primary">Save</button>
            </div>
        </div>
    </div>

    <!-- Floating action buttons -->
    <div class="floating-actions" style="position: fixed; bottom: 2rem; left: 2rem; z-index: 50; display: flex; gap: 1rem; align-items: flex-end;">
        <!-- Change Background Image Button -->
        <button id="change-bg-btn" class="icon-btn" aria-label="Change Background Image" title="Change Background Image">
            <i class="fa-solid fa-image"></i>
        </button>
        <!-- Options Dropdown -->
        <div class="options-container" style="position: relative;">
            <button id="options-toggle-btn" class="icon-btn" aria-label="Options" title="Settings">
                <i class="fa-solid fa-gear"></i>
            </button>
            <div id="options-menu" class="options-menu glass-panel hidden">
                <div class="options-item" id="dark-mode-item" style="cursor: pointer;">
                    <span>Dark Mode</span>
                    <i class="fa-solid fa-moon" id="dark-mode-icon"></i>
                </div>
                <div class="options-divider"></div>
                <div class="options-item-col">
                    <span style="font-size: 0.85em; color: var(--text-muted); display: block; margin-bottom: 8px;">Accent Color</span>
                    <div class="color-swatches">
                        <button class="color-swatch" data-color="#f59e0b" style="background: #f59e0b;" aria-label="Amber"></button>
                        <button class="color-swatch" data-color="#E50914" style="background: #E50914;" aria-label="Netflix Red"></button>
                        <button class="color-swatch" data-color="#7928ca" style="background: #7928ca;" aria-label="Dark Violet"></button>
                        <div class="custom-color-wrapper color-swatch" id="custom-color-wrapper" style="position: relative; overflow: hidden; background: conic-gradient(red, yellow, lime, aqua, blue, magenta, red);" title="Custom Color">
                            <input type="color" id="custom-color-picker" style="opacity: 0; position: absolute; width: 100%; height: 100%; top: 0; left: 0; cursor: pointer;">
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
